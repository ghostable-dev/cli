name: Bug Report
description: File a bug to help us improve.
title: "[Bug]: "
labels: ["bug"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please provide the details below so we can reproduce and fix the issue.
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How do we reproduce the bug?
      placeholder: |
        1. Go to '...'
        2. Run the command '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: Tell us what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Tell us what actually happened.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment details
      description: Include your OS, PHP version, CLI version, etc.
    validations:
      required: false
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other information, logs, or screenshots.
    validations:
      required: false
