name: Release Integrity

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  package-and-attest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build CLI
        run: npm run build

      - name: Package npm artifact
        run: |
          mkdir -p artifacts
          npm pack --pack-destination artifacts

      - name: Generate SHA256 checksums
        run: |
          cd artifacts
          shasum -a 256 *.tgz > SHA256SUMS

      - name: Generate CycloneDX SBOM
        run: |
          npx --yes @cyclonedx/cyclonedx-npm \
            --omit dev \
            --output-format json \
            --output-file artifacts/cli-sbom.cdx.json

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: |
            artifacts/*.tgz
            artifacts/SHA256SUMS
            artifacts/cli-sbom.cdx.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-integrity
          path: artifacts/

      - name: Publish integrity assets to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.tgz
            artifacts/SHA256SUMS
            artifacts/cli-sbom.cdx.json
