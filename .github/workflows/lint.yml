name: Pint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  pint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - uses: ramsey/composer-install@v2
        with:
          composer-options: '--no-progress --no-interaction'
      - run: vendor/bin/pint --test
